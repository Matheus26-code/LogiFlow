<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LogiFlow - Painel de Fretes</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-900 text-white font-sans min-h-screen flex items-center justify-center">

<div class="bg-slate-800 p-8 rounded-2xl shadow-2xl w-full max-w-md border border-slate-700">
    <h1 class="text-3xl font-bold mb-6 text-blue-400 flex items-center gap-2">
        🚚 LogiFlow <span class="text-xs bg-blue-900 text-blue-200 px-2 py-1 rounded">v1.0</span>
    </h1>

    <form id="freightForm" class="space-y-4">
        <div class="grid grid-cols-2 gap-4">
            <div class="space-y-2">
                <label class="block text-xs uppercase font-bold text-slate-400">Origem</label>
                <input type="text" id="origin" placeholder="Cidade" class="w-full bg-slate-700 border-none rounded-lg p-2 focus:ring-2 focus:ring-blue-500 outline-none">
                <select id="originState" class="w-full bg-slate-700 border-none rounded-lg p-2 focus:ring-2 focus:ring-blue-500 outline-none text-sm">
                    <option value="">Selecione o estado</option>
                    <option value="Acre">AC - Acre</option>
                    <option value="Alagoas">AL - Alagoas</option>
                    <option value="Amapá">AP - Amapá</option>
                    <option value="Amazonas">AM - Amazonas</option>
                    <option value="Bahia">BA - Bahia</option>
                    <option value="Ceará">CE - Ceará</option>
                    <option value="Distrito Federal">DF - Distrito Federal</option>
                    <option value="Espírito Santo">ES - Espírito Santo</option>
                    <option value="Goiás">GO - Goiás</option>
                    <option value="Maranhão">MA - Maranhão</option>
                    <option value="Mato Grosso">MT - Mato Grosso</option>
                    <option value="Mato Grosso do Sul">MS - Mato Grosso do Sul</option>
                    <option value="Minas Gerais">MG - Minas Gerais</option>
                    <option value="Pará">PA - Pará</option>
                    <option value="Paraíba">PB - Paraíba</option>
                    <option value="Paraná">PR - Paraná</option>
                    <option value="Pernambuco">PE - Pernambuco</option>
                    <option value="Piauí">PI - Piauí</option>
                    <option value="Rio de Janeiro">RJ - Rio de Janeiro</option>
                    <option value="Rio Grande do Norte">RN - Rio Grande do Norte</option>
                    <option value="Rio Grande do Sul">RS - Rio Grande do Sul</option>
                    <option value="Rondônia">RO - Rondônia</option>
                    <option value="Roraima">RR - Roraima</option>
                    <option value="Santa Catarina">SC - Santa Catarina</option>
                    <option value="São Paulo">SP - São Paulo</option>
                    <option value="Sergipe">SE - Sergipe</option>
                    <option value="Tocantins">TO - Tocantins</option>
                </select>
            </div>
            <div class="space-y-2">
                <label class="block text-xs uppercase font-bold text-slate-400">Destino</label>
                <input type="text" id="destination" placeholder="Cidade" class="w-full bg-slate-700 border-none rounded-lg p-2 focus:ring-2 focus:ring-blue-500 outline-none">
                <select id="destinationState" class="w-full bg-slate-700 border-none rounded-lg p-2 focus:ring-2 focus:ring-blue-500 outline-none text-sm">
                    <option value="">Selecione o estado</option>
                    <option value="Acre">AC - Acre</option>
                    <option value="Alagoas">AL - Alagoas</option>
                    <option value="Amapá">AP - Amapá</option>
                    <option value="Amazonas">AM - Amazonas</option>
                    <option value="Bahia">BA - Bahia</option>
                    <option value="Ceará">CE - Ceará</option>
                    <option value="Distrito Federal">DF - Distrito Federal</option>
                    <option value="Espírito Santo">ES - Espírito Santo</option>
                    <option value="Goiás">GO - Goiás</option>
                    <option value="Maranhão">MA - Maranhão</option>
                    <option value="Mato Grosso">MT - Mato Grosso</option>
                    <option value="Mato Grosso do Sul">MS - Mato Grosso do Sul</option>
                    <option value="Minas Gerais">MG - Minas Gerais</option>
                    <option value="Pará">PA - Pará</option>
                    <option value="Paraíba">PB - Paraíba</option>
                    <option value="Paraná">PR - Paraná</option>
                    <option value="Pernambuco">PE - Pernambuco</option>
                    <option value="Piauí">PI - Piauí</option>
                    <option value="Rio de Janeiro">RJ - Rio de Janeiro</option>
                    <option value="Rio Grande do Norte">RN - Rio Grande do Norte</option>
                    <option value="Rio Grande do Sul">RS - Rio Grande do Sul</option>
                    <option value="Rondônia">RO - Rondônia</option>
                    <option value="Roraima">RR - Roraima</option>
                    <option value="Santa Catarina">SC - Santa Catarina</option>
                    <option value="São Paulo">SP - São Paulo</option>
                    <option value="Sergipe">SE - Sergipe</option>
                    <option value="Tocantins">TO - Tocantins</option>
                </select>
            </div>
        </div>

        <div>
            <label class="block text-xs uppercase font-bold text-slate-400 mb-1">Peso (kg)</label>
            <input type="number" id="weight" step="0.1" class="w-full bg-slate-700 border-none rounded-lg p-2 outline-none">
        </div>

        <div class="grid grid-cols-3 gap-2">
            <input type="number" id="length" placeholder="Comp." class="bg-slate-700 border-none rounded-lg p-2 outline-none text-sm">
            <input type="number" id="width" placeholder="Larg." class="bg-slate-700 border-none rounded-lg p-2 outline-none text-sm">
            <input type="number" id="height" placeholder="Alt." class="bg-slate-700 border-none rounded-lg p-2 outline-none text-sm">
        </div>

        <button type="submit" class="w-full bg-blue-600 hover:bg-blue-500 transition-colors font-bold py-3 rounded-lg shadow-lg mt-4">
            Calcular Frete
        </button>
    </form>

    <div id="result" class="hidden mt-8 p-4 bg-slate-700 rounded-xl border-l-4 border-blue-500">
        <p class="text-sm text-slate-300">Valor Estimado:</p>
        <h2 id="finalValue" class="text-4xl font-black text-white">R$ 0,00</h2>
        <p id="dist" class="text-xs text-blue-300 mt-2 italic"></p>
    </div>
    <div class="overflow-x-auto mt-6">
        <table class="w-full text-left text-sm">
            <thead>
            <tr class="text-slate-400 border-b border-slate-700">
                <th class="pb-2">Codigo</th>
                <th class="pb-2">Destino</th>
                <th class="pb-2">Valor</th>
            </tr>
            </thead>
            <tbody id="historyTable">
            </tbody>
        </table>
    </div>
</div>

<script>
    const form = document.getElementById('freightForm');
    form.onsubmit = async (e) => {
        e.preventDefault();
        const btn = e.target.querySelector('button');

        const originState = document.getElementById('originState').value;
        const destinationState = document.getElementById('destinationState').value;

        if (!originState || !destinationState) {
            alert('Selecione o estado de origem e destino.');
            return;
        }

        btn.innerText = 'Calculando...';
        btn.disabled = true;

        const data = {
            originCity: document.getElementById('origin').value,
            originState: originState,
            destinationCity: document.getElementById('destination').value,
            destinationState: destinationState,
            weight: parseFloat(document.getElementById('weight').value),
            length: parseFloat(document.getElementById('length').value),
            width: parseFloat(document.getElementById('width').value),
            height: parseFloat(document.getElementById('height').value)
        };

        try {
            const res = await fetch('/api/shipments', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            });
            const result = await res.json();

            document.getElementById('result').classList.remove('hidden');
            document.getElementById('finalValue').innerText = `R$ ${result.freightValue.toFixed(2)}`;
            document.getElementById('dist').innerText = `Distância calculada: ${result.distanceKm.toFixed(2)} km`;
            carregarHistorico();
        } catch (err) {
            alert('Erro ao conectar com a API!');
        } finally {
            btn.innerText = 'Calcular Frete';
            btn.disabled = false;
        }
    };

    async function carregarHistorico() {
        try {
            const res = await fetch('/api/shipments/recent');
            const dados = await res.json();
            const html = dados.map(item => `
                <tr class="border-b border-slate-700/50">
                    <td class="py-2 font-mono text-blue-300">${item.trackingCode}</td>
                    <td class="py-2">${item.destinationCity}</td>
                    <td class="py-2 font-bold text-green-400">R$ ${item.freightValue.toFixed(2)}</td>
                </tr>
            `).join('');
            document.getElementById('historyTable').innerHTML = html;
        } catch (e) { console.error("Erro ao carregar histórico"); }
    }
    carregarHistorico();
</script>
</body>
</html>
